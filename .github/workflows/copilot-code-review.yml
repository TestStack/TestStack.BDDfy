name: Copilot code review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Copilot review
        uses: github/copilot-actions/review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}